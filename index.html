<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HC-SR04 Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#111;color:#fff;display:flex;justify-content:center;min-height:100vh;padding:20px}
.wrap{text-align:center;width:100%;max-width:480px}
.c{background:#1a1a2e;border-radius:16px;padding:30px;margin-bottom:16px}
h1{color:#4a6fa5;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.n{font-size:5rem;font-weight:bold;line-height:1;transition:color 0.3s}
.ok{color:#00d2ff}
.warn{color:#ffd700}
.danger{color:#ff4757}
.ux{color:#4a6fa5;font-size:2rem}
.bb{background:#0f3460;border-radius:13px;height:24px;overflow:hidden;margin:12px 0 8px}
.bf{height:100%;border-radius:13px;transition:width 0.3s;width:0%}
.bf.ok{background:#00d2ff}
.bf.warn{background:#ffd700}
.bf.danger{background:#ff4757}
.bq{display:flex;justify-content:space-between;color:#4a6fa5;font-size:0.7rem}
#cv{background:#0f3460;border-radius:12px;display:block;width:100%;height:auto}
.st{color:#4a6fa5;font-size:0.8rem;margin-top:16px}
.g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.bx{background:#0f3460;border-radius:12px;padding:12px}
.bv{font-size:1.3rem;font-weight:bold;color:#00d2ff}
.bl{font-size:0.65rem;color:#4a6fa5;text-transform:uppercase}
.zr{display:flex;justify-content:center;gap:6px;margin:12px 0 6px}
.zb{background:#0f3460;border-radius:8px;padding:6px 14px;font-size:0.75rem;color:#4a6fa5;border:1px solid transparent;transition:all 0.3s}
.zb.act{background:transparent}
.zb.act.n{color:#ff4757;border-color:#ff4757}
.zb.act.m{color:#ffd700;border-color:#ffd700}
.zb.act.f{color:#00d2ff;border-color:#00d2ff}
.zv{display:flex;justify-content:center;gap:6px;font-size:0.7rem;color:#4a6fa5}
.zv span{width:33%}
.pd{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;font-size:0.75rem;color:#4a6fa5;text-transform:uppercase;letter-spacing:1px}
.pd-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.pd-dot.y{background:#00d2ff;box-shadow:0 0 8px #00d2ff}
.pd-dot.n{background:#4a6fa5}
.ts{color:#4a6fa5;font-size:0.65rem;margin-top:10px;word-break:break-all}
a{color:#4a6fa5}
@media(max-width:500px){.n{font-size:3.5rem}}
</style>
</head>
<body>
<div class="wrap">
<h1 style="margin-bottom:16px">HC-SR04 Distance (Live)</h1>
<div class="c">
<div class="n ok" id="d">--<span class="ux"> cm</span></div>
<div class="bq"><span>0</span><span id="z">--</span><span>400</span></div>
<div class="bb"><div class="bf ok" id="b"></div></div>
</div>
<div class="c">
<div class="zr">
<div class="zb" id="zNear">NEAR</div>
<div class="zb" id="zMid">MID</div>
<div class="zb" id="zFar">FAR</div>
</div>
<div class="zv"><span id="vNear">--</span><span id="vMid">--</span><span id="vFar">--</span></div>
<div class="pd"><span class="pd-dot n" id="pdDot"></span><span id="pdText">Waiting for data...</span></div>
</div>
<div class="c">
<div class="g">
<div class="bx"><div class="bv" id="mn">--</div><div class="bl">Min</div></div>
<div class="bx"><div class="bv" id="av">--</div><div class="bl">Avg</div></div>
<div class="bx"><div class="bv" id="mx">--</div><div class="bl">Max</div></div>
</div>
</div>
<div class="c" style="padding:15px">
<canvas id="cv"></canvas>
</div>
<div class="st"><span id="m">Connecting...</span></div>
<div class="ts"><a href="https://thingspeak.com/channels/3388472" target="_blank">thingspeak.com/channels/3388472</a></div>
</div>
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<script>
(function(){
var cv=document.getElementById('cv'),cx=cv.getContext('2d');
var W,H;
function rz(){W=cv.width=cv.clientWidth*2||800;H=cv.height=240;}
var fh=[],mnI=Infinity,mxI=-Infinity,su=0,ct=0,ld=0;
var zn={n:'near',m:'mid',f:'far'};
function dr(){
rz();cx.clearRect(0,0,W,H);if(fh.length<2)return;
var hi=Math.max.apply(null,fh.concat([50]));
var lo=Math.min.apply(null,fh.concat([0]));
var ra=hi-lo||1;
var py=function(v){return H-(v-lo)/ra*(H-20)-10};
cx.strokeStyle='#00d2ff';cx.lineWidth=3;cx.beginPath();
for(var i=0;i<fh.length;i++){var xi=i/(fh.length-1)*W,yi=py(fh[i]);i===0?cx.moveTo(xi,yi):cx.lineTo(xi,yi)}cx.stroke();
cx.fillStyle='rgba(0,210,255,0.08)';cx.lineTo(W,H);cx.lineTo(0,H);cx.closePath();cx.fill();
cx.fillStyle='#4a6fa5';cx.font='16px Arial';cx.textAlign='right';
cx.fillText(Math.round(hi)+'cm',W-8,22);cx.fillText(Math.round(lo)+'cm',W-8,H-6);
}
function gz(v){
if(v<2||v>400)return'clear';
if(v<50)return'near';if(v<150)return'mid';return'far';
}
function u(v,r,zone){
var e=document.getElementById('d');
e.innerHTML=v.toFixed(1)+'<span class="ux"> cm</span>';
var zs='ok',zl='IN RANGE';
if(v<10){zs='danger';zl='TOO CLOSE'}else if(v<50){zs='warn';zl='NEAR'}else if(v>300){zs='danger';zl='TOO FAR'}
e.className='n '+zs;
document.getElementById('b').style.width=Math.min(v/4,100)+'%';
document.getElementById('b').className='bf '+zs;
document.getElementById('z').textContent=zl;
if(v<mnI)mnI=v;if(v>mxI)mxI=v;su+=v;ct++;
document.getElementById('mn').textContent=mnI.toFixed(1);
document.getElementById('mx').textContent=mxI.toFixed(1);
document.getElementById('av').textContent=(su/ct).toFixed(1);
document.getElementById('zNear').className='zb';
document.getElementById('zMid').className='zb';
document.getElementById('zFar').className='zb';
if(zone==='near')document.getElementById('zNear').className='zb act n';
else if(zone==='mid')document.getElementById('zMid').className='zb act m';
else if(zone==='far')document.getElementById('zFar').className='zb act f';
var ln=-1,lm=-1,lf=-1;
for(var i=0;i<fh.length;i++){var fz=gz(fh[i]);if(fz==='near')ln=fh[i];else if(fz==='mid')lm=fh[i];else if(fz==='far')lf=fh[i];}
document.getElementById('vNear').textContent=ln>0?ln.toFixed(1)+'cm':'--';
document.getElementById('vMid').textContent=lm>0?lm.toFixed(1)+'cm':'--';
document.getElementById('vFar').textContent=lf>0?lf.toFixed(1)+'cm':'--';
var p=zone!=='clear';
var pd=document.getElementById('pdDot'),pt=document.getElementById('pdText');
if(p){pd.className='pd-dot y';pt.textContent='Object detected in '+zone.toUpperCase()+' zone'}
else{pd.className='pd-dot n';pt.textContent='No object detected'}
fh.push(v);if(fh.length>40)fh.shift();
dr();
document.getElementById('m').textContent='Live | Data: '+new Date().toLocaleTimeString();
}
var client=mqtt.connect('wss://broker.hivemq.com:8884/mqtt',{clientId:'hc-sr04-web-'+(Math.random()*9999|0)});
client.on('connect',function(){
document.getElementById('m').textContent='Connected, waiting for data...';
client.subscribe('hc-sr04/distance');
});
client.on('message',function(t,p){
try{
var d=JSON.parse(p.toString());
var v=parseFloat(d.distance);if(isNaN(v))return;
var r=parseFloat(d.raw)||v;
var zone=d.zone||gz(v);
u(v,r,zone);
}catch(e){}
});
client.on('close',function(){document.getElementById('m').textContent='Disconnected. Reconnecting...'});
client.on('error',function(){document.getElementById('m').textContent='Connection error. Retrying...'});
})();
</script>
</body>
</html>
